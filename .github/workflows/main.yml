name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
      changelog: ${{ steps.build_changelog.outputs.CHANGELOG }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git log history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Gradlew Permissions
        run: chmod +x gradlew

      - name: Auto-Increment Version
        id: get_version
        run: |
          PROP_FILE="app/version.properties"
          # Ensure directory exists for version file
          mkdir -p app
          if [ ! -f "$PROP_FILE" ]; then
            echo "patch=0" > "$PROP_FILE"
            echo "code=1" >> "$PROP_FILE"
          fi
          OLD_PATCH=$(grep "patch=" "$PROP_FILE" | cut -d'=' -f2)
          OLD_CODE=$(grep "code=" "$PROP_FILE" | cut -d'=' -f2)
          NEW_PATCH=$((OLD_PATCH + 1))
          NEW_CODE=$((OLD_CODE + 1))
          NEW_NAME="1.0.$NEW_PATCH"
          
          sed -i "s/patch=.*/patch=$NEW_PATCH/" "$PROP_FILE"
          sed -i "s/code=.*/code=$NEW_CODE/" "$PROP_FILE"
          
          echo "VERSION=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_NAME" >> $GITHUB_ENV
          echo "PROP_PATH=$PROP_FILE" >> $GITHUB_ENV

      - name: Generate Changelog
        id: build_changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"* %s (%h)" -5 >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.PROP_PATH }}"
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]" || echo "No changes"
          git push origin main --force-with-lease

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find and Prepare APK
        run: |
          mkdir -p final-artifacts
          # The 'Force Search' strategy: find any APK in any build folder
          find . -name "*.apk" -path "*/build/*" -exec cp {} final-artifacts/calmplayer-release.apk \;
          
          if [ -f final-artifacts/calmplayer-release.apk ]; then
            echo "Success: APK found and moved to staging."
          else
            echo "Error: Gradle built successfully but no APK was found in build folders."
            # List files to help debug if it fails
            ls -R
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalmApp-Build-Package
          path: final-artifacts/calmplayer-release.apk
          if-no-files-found: error

  release:
    name: Create Production-Ready Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: CalmApp-Build-Package
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.app_version }}
          name: "CalmPlayer v${{ needs.build.outputs.app_version }} Stable"
          body: |
            ## 📝 Changelog
            ${{ needs.build.outputs.changelog }}
            
            ---
            **📦 Build Details:**
            - **Version:** ${{ needs.build.outputs.app_version }}
            - **Compatibility:** Android 12 + 
            - **Hardware:** Optimized for Celeron coloros / 4GB RAM devices.
          draft: false
          prerelease: false
          files: release-artifacts/calmplayer-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
