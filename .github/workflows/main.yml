name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
      changelog: ${{ steps.build_changelog.outputs.CHANGELOG }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix Gradlew Permissions
        run: chmod +x gradlew

      - name: Auto-Increment Version
        id: get_version
        run: |
          PROP_FILE="app/version.properties"
          mkdir -p app
          if [ ! -f "$PROP_FILE" ]; then
            echo "patch=0" > "$PROP_FILE"
            echo "code=1" >> "$PROP_FILE"
          fi
          OLD_PATCH=$(grep "patch=" "$PROP_FILE" | cut -d'=' -f2)
          OLD_CODE=$(grep "code=" "$PROP_FILE" | cut -d'=' -f2)
          NEW_PATCH=$((OLD_PATCH + 1))
          NEW_CODE=$((OLD_CODE + 1))
          NEW_NAME="1.0.$NEW_PATCH"
          
          sed -i "s/patch=.*/patch=$NEW_PATCH/" "$PROP_FILE"
          sed -i "s/code=.*/code=$NEW_CODE/" "$PROP_FILE"
          
          echo "VERSION=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_NAME" >> $GITHUB_ENV
          echo "PROP_PATH=$PROP_FILE" >> $GITHUB_ENV

      - name: Generate Smart Changelog
        id: build_changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "### 🚀 New Features" >> $GITHUB_OUTPUT
          git log --pretty=format:"* %s" -20 | grep -i "feat:" >> $GITHUB_OUTPUT || echo "* No new features in this build" >> $GITHUB_OUTPUT
          
          echo -e "\n### 🛠️ Bug Fixes & Improvements" >> $GITHUB_OUTPUT
          git log --pretty=format:"* %s" -20 | grep -E -i "fix:|refactor:|perf:" >> $GITHUB_OUTPUT || echo "* Performance optimizations and stability fixes" >> $GITHUB_OUTPUT
          
          echo -e "\n### 📝 Technical Changes" >> $GITHUB_OUTPUT
          git log --pretty=format:"* %s" -20 | grep -i "docs:" >> $GITHUB_OUTPUT || echo "* Internal code documentation updated" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.PROP_PATH }}"
          git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]" || echo "No changes"
          git push origin main --force-with-lease

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find and Prepare APK
        run: |
          mkdir -p final-artifacts
          find . -name "*.apk" -path "*/build/*" -exec cp {} final-artifacts/calmplayer-release.apk \;
          if [ -f final-artifacts/calmplayer-release.apk ]; then
            echo "Success: APK found."
          else
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalmApp-Build-Package
          path: final-artifacts/calmplayer-release.apk

  release:
    name: Create Production-Ready Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: CalmApp-Build-Package
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.app_version }}
          name: "CalmPlayer v${{ needs.build.outputs.app_version }} Stable"
          body: |
            ## 📦 Release Notes - v${{ needs.build.outputs.app_version }}
            
            ${{ needs.build.outputs.changelog }}
            
            ---
            **📱 Device Optimization:**
            - **Target Phone:** Oppo Reno 3 (ColorOS 12)
            - **Laptop Used for Dev:** Intel Celeron N4000 / 4GB RAM
            - **Build Status:** Stable Production Build
          draft: false
          prerelease: false
          files: release-artifacts/calmplayer-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
